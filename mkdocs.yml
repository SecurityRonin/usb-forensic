site_name: usb-forensic
site_url: https://securityronin.github.io/usb-forensic/
repo_url: https://github.com/SecurityRonin/usb-forensic
repo_name: SecurityRonin/usb-forensic
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - PRD: prd.md
  - Feature Parity: feature-parity.md
  - Competitive Landscape: competitive-landscape.md
  - Roadmap: roadmap.md
  - Validation: validation.md
  - Decisions:
      - Overview: decisions/README.md
      - 0001 Correlation model: decisions/0001-correlation-and-consistency-model.md
      - 0002 Delegate parsing: decisions/0002-delegate-parsing-to-fleet-crates.md
      - 0003 Volume analysis: decisions/0003-scheme-agnostic-volume-analysis.md
      - 0004 BitLocker To Go: decisions/0004-bitlocker-to-go-detection.md
  - Privacy Policy: privacy.md
  - Terms of Service: terms.md

plugins:
  - search
